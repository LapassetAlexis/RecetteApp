services:
  app:
    build: .
    container_name: menu-planner
    ports:
      - "${APP_PORT:-8020}:8000"
    environment:
      # Notion
      NOTION_TOKEN: "${NOTION_TOKEN}"
      # Provider LLM : "ollama" (défaut) ou "gemini"
      LLM_PROVIDER: "${LLM_PROVIDER:-ollama}"
      # Ollama (utilisé si LLM_PROVIDER=ollama)
      OLLAMA_URL: "http://ollama:11434"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-qwen2.5:3b}"
      # Gemini (utilisé si LLM_PROVIDER=gemini)
      GEMINI_API_KEY: "${GEMINI_API_KEY}"
      GEMINI_MODEL: "${GEMINI_MODEL:-gemini-2.0-flash-001}"
      # App
      APP_TITLE: "Menu Planner Tristabeau"
      SECRET_KEY: "${SECRET_KEY:-change-me}"
    volumes:
      - menu-planner-data:/data
    depends_on:
      ollama:
        condition: service_started
    restart: unless-stopped
    networks:
      - menu-planner-net

  ollama:
    image: ollama/ollama:latest
    container_name: menu-planner-ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama-models:/root/.ollama
    restart: unless-stopped
    networks:
      - menu-planner-net

volumes:
  menu-planner-data:
  ollama-models:

networks:
  menu-planner-net:
