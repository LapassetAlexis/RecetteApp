services:
  app:
    build: .
    container_name: menu-planner
    ports:
      - "8020:8000"
    env_file:
      - .env
    volumes:
      - menu-planner-data:/data
    depends_on:
      ollama:
        condition: service_started
    restart: unless-stopped
    networks:
      - menu-planner-net

  ollama:
    image: ollama/ollama:latest
    container_name: menu-planner-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    restart: unless-stopped
    networks:
      - menu-planner-net
    # Pour utiliser le GPU NVIDIA (commenter si pas dispo)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  menu-planner-data:
  ollama-models:

networks:
  menu-planner-net:
